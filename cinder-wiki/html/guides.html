        // Initialize guides page
        function initGuidesPage() {
            const guidesGrid = document.getElementById('guidesGrid');
            const modal = document.getElementById('guideModal');
            const modalClose = document.getElementById('modalClose');
            const modalOverlay = modal.querySelector('.guide-modal-overlay');

            // Generate guide cards
            guidesData.forEach(guide => {
                const card = document.createElement('div');
                card.className = 'guide-card';
                card.dataset.category = guide.category;
                card.innerHTML = `
                    <div class="guide-card-icon">${guide.icon}</div>
                    <h3 class="guide-card-title">${guide.title}</h3>
                    <p class="guide-card-description">${guide.description}</p>
                `;

                // Open modal on click
                card.addEventListener('click', () => {
                    openGuideModal(guide);
                });

                guidesGrid.appendChild(card);
            });

            // Filter functionality
            const filterButtons = document.querySelectorAll('.filter-btn');
            filterButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const category = btn.dataset.category;
                    
                    // Update active button
                    filterButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Filter cards
                    const cards = document.querySelectorAll('.guide-card');
                    cards.forEach(card => {
                        if (category === 'all' || card.dataset.category === category) {
                            card.classList.remove('hidden');
                        } else {
                            card.classList.add('hidden');
                        }
                    });
                });
            });

            // Close modal handlers
            modalClose.addEventListener('click', closeGuideModal);
            modalOverlay.addEventListener('click', closeGuideModal);

            // Close on ESC key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    closeGuideModal();
                }
            });
        }

        // Open guide modal
        function openGuideModal(guide) {
            const modal = document.getElementById('guideModal');
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');

            modalIcon.innerHTML = guide.icon;
            modalTitle.textContent = guide.title;
            modalBody.innerHTML = guide.content;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close guide modal
        function closeGuideModal() {
            const modal = document.getElementById('guideModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Initialize on DOM load
        document.addEventListener('DOMContentLoaded', () => {
            initGuidesPage();
        });
    </script>
