<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items - CinderRPG Wiki</title>
    <link rel="icon" type="x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/items.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <!-- Minecraft Pixel Font -->
    <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">
    <!-- RPG Awesome icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rpg-awesome/css/rpg-awesome.min.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/473c5494b9.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Header Component Slot -->
    <div id="header-slot"></div>

    <main class="items-main">
        <div class="items-container">
            <!-- Left Sidebar: Filters -->
            <aside class="items-sidebar">
                <div class="sidebar-content">
                    <!-- Search Bar -->
                    <div class="search-section">
                        <div class="search-box">
                            <i class="ph ph-magnifying-glass"></i>
                            <input type="text" id="itemSearch" placeholder="Search items...">
                        </div>
                    </div>

                    <!-- Category Filters -->
                    <div class="filter-section">
                        <h3 class="filter-title">Type</h3>
                        <div class="filter-grid">
                            <button class="filter-btn category-btn active" data-category="all">
                                <i class="ra ra-perspective-dice-six"></i>
                                <span>All</span>
                            </button>
                            <button class="filter-btn category-btn" data-category="weapons">
                                <i class="ra ra-crossed-swords"></i>
                                <span>Weapons</span>
                            </button>
                            <button class="filter-btn category-btn" data-category="armor">
                                <i class="ra ra-vest"></i>
                                <span>Armor</span>
                            </button>
                            <button class="filter-btn category-btn" data-category="baubles">
                                <i class="ra ra-gem-pendant"></i>
                                <span>Baubles</span>
                            </button>
                            <button class="filter-btn category-btn" data-category="tools">
                                <i class="ra ra-hammer"></i>
                                <span>Tools</span>
                            </button>
                            <button class="filter-btn category-btn" data-category="ingredients">
                                <i class="ra ra-droplet"></i>
                                <span>Ingredients</span>
                            </button>
                            <button class="filter-btn category-btn" data-category="materials">
                                <i class="ra ra-crystals"></i>
                                <span>Materials</span>
                            </button>
                            <button class="filter-btn category-btn" data-category="consumables">
                                <i class="ra ra-apple"></i>
                                <span>Consumables</span>
                            </button>
                            <button class="filter-btn category-btn" data-category="off-hand">
                                <i class="ra ra-shield"></i>
                                <span>Off-Hand/Utility</span>
                            </button>
                            <button class="filter-btn category-btn" data-category="misc">
                                <i class="ra ra-wooden-sign"></i>
                                <span>Misc</span>
                            </button>
                        </div>
                    </div>

                    <!-- Advanced Filters -->
                    <div class="filter-section advanced-section">
                        <button class="advanced-toggle" id="advancedToggle">
                            <span>Advanced Filters</span>
                            <i class="ph ph-caret-down"></i>
                        </button>
                        <div class="advanced-content" id="advancedContent">
                            <!-- Class/Weapon Type -->
                            <div class="filter-group">
                                <h4 class="filter-subtitle">Class/Weapon Type</h4>
                                <div class="filter-grid-small">
                                    <button class="filter-btn-sm" data-class="knight">Knight</button>
                                    <button class="filter-btn-sm" data-class="samurai">Samurai</button>
                                    <button class="filter-btn-sm" data-class="berserker">Berserker</button>
                                    <button class="filter-btn-sm" data-class="spearsaint">Spearsaint</button>
                                    <button class="filter-btn-sm" data-class="destruction">Destruction</button>
                                    <button class="filter-btn-sm" data-class="conjuration">Conjuration</button>
                                    <button class="filter-btn-sm" data-class="abjuration">Abjuration</button>
                                    <button class="filter-btn-sm" data-class="restoration">Restoration</button>
                                    <button class="filter-btn-sm" data-class="assassin">Assassin</button>
                                    <button class="filter-btn-sm" data-class="swashbuckler">Swashbuckler</button>
                                    <button class="filter-btn-sm" data-class="archer">Archer</button>
                                    <button class="filter-btn-sm" data-class="ballista">Ballista</button>
                                </div>
                            </div>

                            <!-- Rarity -->
                            <div class="filter-group">
                                <h4 class="filter-subtitle">Rarity</h4>
                                <div class="filter-grid-small">
                                    <button class="filter-btn-sm rarity-common" data-rarity="common">Common</button>
                                    <button class="filter-btn-sm rarity-uncommon" data-rarity="uncommon">Uncommon</button>
                                    <button class="filter-btn-sm rarity-rare" data-rarity="rare">Rare</button>
                                    <button class="filter-btn-sm rarity-super-rare" data-rarity="super-rare">Super Rare</button>
                                    <button class="filter-btn-sm rarity-super" data-rarity="super">Super</button>
                                    <button class="filter-btn-sm rarity-legendary" data-rarity="legendary">Legendary</button>
                                    <button class="filter-btn-sm rarity-world" data-rarity="world">World Tier</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="action-buttons">
                        <button class="action-btn reset-btn" id="resetBtn">
                            <i class="ph ph-trash"></i>
                            <span>Reset Filters</span>
                        </button>
                        <button class="action-btn apply-btn" id="applyBtn">
                            <i class="ph ph-check"></i>
                            <span>Apply Filters</span>
                        </button>
                        <button class="action-btn revert-btn" id="revertBtn">
                            <i class="ph ph-arrow-counter-clockwise"></i>
                            <span>Revert Changes</span>
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Right Panel: Results -->
            <section class="items-results">
                <div class="results-header">
                    <h2 class="results-title">Results</h2>
                    <div class="results-info">
                        <span id="pageInfo">Page 1</span>
                    </div>
                </div>

                <div class="items-grid" id="itemsGrid">
                    <!-- Item cards will be dynamically generated here -->
                </div>

                <div class="pagination" id="pagination">
                    <button class="page-btn" id="firstPage" title="First Page">
                        <i class="ph ph-caret-double-left"></i>
                    </button>
                    <button class="page-btn" id="prevPage" title="Previous Page">
                        <i class="ph ph-caret-left"></i>
                    </button>
                    <div class="page-number" id="currentPage">1</div>
                    <button class="page-btn" id="nextPage" title="Next Page">
                        <i class="ph ph-caret-right"></i>
                    </button>
                    <button class="page-btn" id="lastPage" title="Last Page">
                        <i class="ph ph-caret-double-right"></i>
                    </button>
                </div>
            </section>
        </div>

        <!-- Location Tooltip -->
        <div class="location-tooltip" id="locationTooltip"></div>
    </main>

    <!-- Footer Component Slot -->
    <div id="footer-slot"></div>

    <!-- Modal Component Slot -->
    <div id="modal-slot"></div>

    <!-- Load Component Manager -->
    <script src="../js/components.js"></script>

        // Pagination
        let currentPage = 1;
        const itemsPerPage = 9;
        let filteredItems = [...itemsData];

        // Initialize page
        function initItemsPage() {
            renderItems();
            setupEventListeners();
        }

        // Render items grid
        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const startIdx = (currentPage - 1) * itemsPerPage;
            const endIdx = startIdx + itemsPerPage;
            const pageItems = filteredItems.slice(startIdx, endIdx);

            grid.innerHTML = pageItems.map(item => createItemCard(item)).join('');
            updatePagination();

            // Attach location hover listeners
            document.querySelectorAll('.item-location-icon').forEach(icon => {
                icon.addEventListener('mouseenter', showLocationTooltip);
                icon.addEventListener('mouseleave', hideLocationTooltip);
            });
        }

        // Create item card HTML
        function createItemCard(item) {
            const rarityClass = `rarity-${item.rarity}`;
            
            // Render modifiers
            const modifiersText = (item.modifiers || []).map(mod => {
                return `<div class="modifier-line" style="border-color: ${mod.color || '#55ffff'};"><span class="modifier-label">========== Modifiers ==========</span><br><span style="color: ${mod.color || '#55ffff'}">${mod.name}: ${mod.value}</span></div>`;
            }).join('');

            // Render unique modifiers
            const uniqueModifiersText = (item.uniqueModifiers || []).map(mod => {
                return `<div class="modifier-line unique" style="border-color: ${mod.color || '#ff55ff'};"><span class="modifier-label">------- Unique Modifiers -------</span><br><span style="color: ${mod.color || '#00ff00'}">${mod.name}: ${mod.value}</span></div>`;
            }).join('');

            // Render expansion
            const expansionText = item.expansion ? `<div class="expansion-badge">${item.expansion}</div>` : '';

            // Render main stats
            const statsText = (item.stats || []).map(stat => {
                const nameColor = '#ffd800'; // Gold for stat names
                const valueColor = stat.color || '#ffffff'; // Custom or white for values
                return `<span style="color: ${nameColor}">■ ${stat.name}:</span> <span style="color: ${valueColor}">${stat.value}</span>`;
            }).join('<br>');

            // Render identifications (for Wynncraft-style items)
            const identificationsText = (item.identifications || []).map(id => {
                const color = id.color || (id.value.startsWith('+') ? '#00ff00' : '#ff5555');
                return `<span style="color: ${color}">${id.value} ${id.name}</span>`;
            }).join('<br>');

            // Legacy damage rendering for old items
            const damageText = Object.entries(item.damage || {})
                .map(([type, range]) => {
                    const color = { neutral: '#fcda03', earth: '#00ff00', fire: '#ff5555', water: '#55ffff', thunder: '#ffff55', air: '#ffffff' }[type];
                    const icon = { neutral: '☀', earth: '♣', fire: '🔥', water: '💧', thunder: '⚡', air: '❋' }[type];
                    return `<span style="color: ${color}">${icon} ${type.charAt(0).toUpperCase() + type.slice(1)} Damage: ${range[0]}-${range[1]}</span>`;
                }).join('<br>');

            // If it's an image card, just display the image directly
            if (item.isImage) {
                return `
                    <div class="item-image-wrapper">
                        <div class="item-image-icons">
                            <button class="item-icon-btn item-location-icon" data-location="${item.location?.name || 'Unknown'}" data-coords="${item.location?.coords || 'Unknown'}" title="How to get">
                                <i class="ph ph-map-pin"></i>
                            </button>
                        </div>
                        <img src="${item.icon}" alt="${item.name}" class="item-card-image ${rarityClass}">
                    </div>
                `;
            }

            // Render Minecraft-style tooltip card
            return `
                <div class="item-card ${rarityClass}">
                    <div class="mc-header">
                        <div class="mc-name ${rarityClass}">${item.name}</div>
                        <button class="item-icon-btn item-location-icon" data-location="${item.location?.name || 'Unknown'}" data-coords="${item.location?.coords || 'Unknown'}" title="How to get">
                            <i class="ph ph-map-pin"></i>
                        </button>
                    </div>
                    <div class="mc-icon-container">
                        ${item.isImageIcon ? `<img src="${item.icon}" alt="${item.name}" class="mc-icon">` : `<div class="mc-icon">${item.icon}</div>`}
                    </div>
                    ${item.mainHand ? `<div class="mc-main-hand">${item.mainHand}</div>` : ''}
                    ${item.attackSpeed ? `<div class="mc-attack-speed">${item.attackSpeed}</div>` : ''}
                    ${item.attackDamage ? `<div class="mc-attack-speed">${item.attackDamage}</div>` : ''}
                    ${item.itemId ? `<div class="mc-item-id">${item.itemId}</div>` : ''}
                    ${expansionText}
                    ${item.stats || item.damage ? `<div class="mc-separator">━━━━━━━━━━━━━━━━━━━━━</div>` : ''}
                    ${damageText ? `<div class="mc-damage">${damageText}</div>` : ''}
                    ${statsText ? `<div class="mc-stats">${statsText}</div>` : ''}
                    ${item.stats || item.damage ? `<div class="mc-separator">━━━━━━━━━━━━━━━━━━━━━</div>` : ''}
                    ${item.special ? `<div class="mc-special">${item.special}</div>` : ''}
                </div>
            `;
        }

        // Location tooltip
        function showLocationTooltip(e) {
            const tooltip = document.getElementById('locationTooltip');
            const location = e.currentTarget.dataset.location;
            const coords = e.currentTarget.dataset.coords;
            tooltip.innerHTML = `This item can be obtained from <strong>${location}</strong> located at <strong>${coords}</strong>.`;
            tooltip.style.display = 'block';
            positionTooltip(e, tooltip);
        }

        function hideLocationTooltip() {
            document.getElementById('locationTooltip').style.display = 'none';
        }

        function positionTooltip(e, tooltip) {
            const x = e.clientX + 15;
            const y = e.clientY + 15;
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        // Pagination
        function updatePagination() {
            const totalPages = Math.ceil(filteredItems.length / itemsPerPage);
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;

            document.getElementById('firstPage').disabled = currentPage === 1;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
            document.getElementById('lastPage').disabled = currentPage === totalPages;
        }

        // Event listeners
        function setupEventListeners() {
            // Advanced toggle
            document.getElementById('advancedToggle').addEventListener('click', () => {
                const content = document.getElementById('advancedContent');
                const icon = document.querySelector('#advancedToggle i');
                content.classList.toggle('active');
                icon.classList.toggle('ph-caret-down');
                icon.classList.toggle('ph-caret-up');
            });

            // Category filters - apply filter immediately
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    applyFilters();
                });
            });

            // Small filter buttons - apply filter immediately
            document.querySelectorAll('.filter-btn-sm').forEach(btn => {
                btn.addEventListener('click', () => {
                    btn.classList.toggle('active');
                    applyFilters();
                });
            });

            // Search - real-time filtering
            const searchInput = document.getElementById('itemSearch');
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    applyFilters();
                });
            }
            // Pagination
            document.getElementById('firstPage').addEventListener('click', () => {
                currentPage = 1;
                renderItems();
            });
            document.getElementById('prevPage').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderItems();
                }
            });
            document.getElementById('nextPage').addEventListener('click', () => {
                const totalPages = Math.ceil(filteredItems.length / itemsPerPage);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderItems();
                }
            });
            document.getElementById('lastPage').addEventListener('click', () => {
                currentPage = Math.ceil(filteredItems.length / itemsPerPage);
                renderItems();
            });

            // Action buttons
            document.getElementById('resetBtn').addEventListener('click', () => {
                // Reset all filters
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('.category-btn[data-category="all"]').classList.add('active');
                document.querySelectorAll('.filter-btn-sm').forEach(b => b.classList.remove('active'));
                document.getElementById('itemSearch').value = '';
                applyFilters();
            });

            document.getElementById('applyBtn').addEventListener('click', () => {
                applyFilters();
            });

            document.getElementById('revertBtn').addEventListener('click', () => {
                filteredItems = [...itemsData];
                currentPage = 1;
                renderItems();
            });
        }
        // Apply filters
        function applyFilters() {
            const activeCategory = document.querySelector('.category-btn.active')?.dataset.category;
            const searchTerm = document.getElementById('itemSearch').value.toLowerCase();
            
            // Get active class filters
            const activeClasses = Array.from(document.querySelectorAll('.filter-btn-sm[data-class].active'))
                .map(btn => btn.dataset.class);
            
            // Get active rarity filters
            const activeRarities = Array.from(document.querySelectorAll('.filter-btn-sm[data-rarity].active'))
                .map(btn => btn.dataset.rarity);

            filteredItems = itemsData.filter(item => {
                // Category filter
                const matchesCategory = !activeCategory || activeCategory === 'all' || item.category === activeCategory;
                
                // Search filter
                const matchesSearch = !searchTerm || 
                    item.name.toLowerCase().includes(searchTerm) ||
                    item.itemId?.toLowerCase().includes(searchTerm) ||
                    item.lore?.toLowerCase().includes(searchTerm) ||
                    item.special?.toLowerCase().includes(searchTerm);
                
                // Class filter
                const matchesClass = activeClasses.length === 0 || 
                    activeClasses.some(classType => {
                        if (item.classReq) {
                            return item.classReq.toLowerCase().includes(classType);
                        }
                        if (item.stats) {
                            return item.stats.some(stat => 
                                stat.name === 'Requires' && stat.value.toLowerCase().includes(classType)
                            );
                        }
                        return false;
                    });
                
                // Rarity filter
                const matchesRarity = activeRarities.length === 0 || 
                    activeRarities.includes(item.rarity);
                
                return matchesCategory && matchesSearch && matchesClass && matchesRarity;
            });

            currentPage = 1;
            renderItems();
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initItemsPage);
    </script>
</body>
</html>
